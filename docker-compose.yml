services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: fultang_compta_financiere
      POSTGRES_USER: fultang_user
      POSTGRES_PASSWORD: fultang2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fultang_user -d fultang_compta_financiere"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DB_NAME: fultang_compta_financiere
      DB_USER: fultang_user
      DB_PASSWORD: fultang2026
      DB_HOST: postgres
      DB_PORT: 5432
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
